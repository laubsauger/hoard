name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages. Pages must be configured with
# Settings → Pages → Build and deployment → Source: "GitHub Actions". Serves at
# https://laubsauger.github.io/hoard/ (base '/hoard/' is set in vite.config.ts).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege token the deploy-pages action needs (id-token for OIDC attestation).
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; let an in-progress run finish (don't cancel a publish mid-flight).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # build = `tsc --noEmit && vite build` → static site in dist/. base '/hoard/' comes from vite.config.ts.
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
